<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Super Liste de Courses</title>
    <style>
        /* Variables de couleurs : Mode Clair par défaut */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --checked-color: #95a5a6;
            --coché-bg: #eaeded;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
        }
        
        /* Mode Sombre Automatique (détecte les réglages de l'iPhone) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-color: #e0e0e0;
                --accent-color: #2980b9;
                --checked-color: #555555;
                --coché-bg: #2c2c2c;
                --border-color: #333333;
                --input-bg: #2a2a2a;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* BARRE D'AJOUT RAPIDE */
        .ajout-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .ajout-container input {
            flex: 1;
            border: 2px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .ajout-container button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* STRUCTURE DES RAYONS */
        #liste-a-prendre {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .rayon {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .rayon:empty {
            display: none;
        }

        .rayon-titre {
            font-size: 16px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        /* LIGNE PRODUIT */
        .produit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            -webkit-tap-highlight-color: transparent;
        }

        .produit-item:last-child {
            border-bottom: none;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--checked-color);
            border-radius: 6px;
            margin-right: 12px;
            outline: none;
            position: relative;
            background-color: var(--input-bg);
        }

        input[type="checkbox"]:checked {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .produit-texte {
            font-size: 16px;
        }

        input[type="checkbox"]:checked + .produit-texte {
            color: var(--checked-color);
            text-decoration: line-through;
        }

        /* COMPTEUR DE QUANTITÉ */
        .quantite-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .quantite-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .quantite-valeur {
            font-size: 14px;
            font-weight: bold;
            min-width: 14px;
            text-align: center;
        }

        /* ZONE COCHÉE */
        #liste-coches {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed var(--checked-color);
        }

        #liste-coches .rayon-titre {
            color: var(--checked-color);
            text-align: center;
            border-bottom: none;
        }

        #liste-coches .produit-item {
            background-color: var(--coché-bg);
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            border-bottom: none;
        }

        #liste-coches .quantite-control {
            display: none; /* Cache les boutons +/- quand c'est coché */
        }

        /* BOUTON RESET FOOTER */
        .btn-reset {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste Pro</h1>

    <div class="ajout-container">
        <input type="text" id="nouvel-article" placeholder="Ajouter un imprévu... (ex: Piles)">
        <button onclick="ajouterArticleManuel()">+</button>
    </div>

    <div id="conteneur-liste">
        <div id="liste-a-prendre"></div>

        <div id="liste-coches">
            <div class="rayon-titre">✅ Articles déjà pris</div>
        </div>
    </div>

    <button class="btn-reset" onclick="toutEffacer()">🔄 Tout Décocher</button>

    <script>
        // Ta liste fixe de produits de base
        const produitsParRayon = {
            "🍉 Fruits & Légumes": [
                {id: "p1", nom: "Raisin"}, {id: "p2", nom: "Tomate"}, {id: "p3", nom: "Melon"}, 
                {id: "p4", nom: "Courgettes"}, {id: "p5", nom: "Brocoli"}
            ],
            "🥩 Frais & Viande": [
                {id: "p6", nom: "Jambon"}, {id: "p7", nom: "Fromage"}, {id: "p8", nom: "Yaourt"}, 
                {id: "p9", nom: "Knacki"}, {id: "p10", nom: "Saucisson"}, {id: "p11", nom: "Saumon"}, 
                {id: "p12", nom: "Poisson"}
            ],
            "🥐 Épicerie": [
                {id: "p13", nom: "Petit déj (Céréales)"}, {id: "p14", nom: "Chips"}, {id: "p15", nom: "Lentilles"}
            ],
            "🍾 Boissons": [
                {id: "p16", nom: "Limonade"}, {id: "p17", nom: "Jus de fruit"}
            ],
            "🧼 Hygiène & Maison": [
                {id: "p18", nom: "Dentifrice"}, {id: "p19", nom: "Déodorant"}, {id: "p20", nom: "Pastilles lave-vaisselle"}
            ]
        };

        const conteneurAPrendre = document.getElementById('liste-a-prendre');
        const conteneurCoches = document.getElementById('liste-coches');

        // Charger ou initialiser la base de données des produits dynamiques (pour inclure les ajouts manuels et quantités)
        let listeData = JSON.parse(localStorage.getItem('liste_courses_data')) || {};

        // Initialiser les produits de base s'ils n'existent pas encore en mémoire
        Object.keys(produitsParRayon).forEach(rayon => {
            produitsParRayon[rayon].forEach(p => {
                if (!listeData[p.id]) {
                    listeData[p.id] = { id: p.id, nom: p.nom, rayon: rayon, checked: false, qte: 1, permanent: true };
                }
            });
        });

        function sauvegarderDonnees() {
            localStorage.setItem('liste_courses_data', JSON.stringify(listeData));
        }

        // Création visuelle d'une ligne d'article
        function genererDOMArticle(item) {
            const divItem = document.createElement('div');
            divItem.className = 'produit-item';
            divItem.id = `item-${item.id}`;

            // Partie Checkbox + Texte
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = item.checked;
            checkbox.addEventListener('change', () => {
                item.checked = checkbox.checked;
                sauvegarderDonnees();
                deplacerVisuellement(item, divItem);
            });

            const span = document.createElement('span');
            span.className = 'produit-texte';
            span.innerHTML = `${item.nom} <span class="badge-qte" id="badge-${item.id}" style="font-weight:bold; color:var(--accent-color);">${item.qte > 1 ? '(x' + item.qte + ')' : ''}</span>`;

            label.appendChild(checkbox);
            label.appendChild(span);
            divItem.appendChild(label);

            // Partie Boutons quantité (+ / -)
            const divQte = document.createElement('div');
            divQte.className = 'quantite-control';

            const btnMoins = document.createElement('button');
            btnMoins.className = 'quantite-btn';
            btnMoins.textContent = '-';
            btnMoins.addEventListener('click', () => {
                if (item.qte > 1) {
                    item.qte--;
                    document.getElementById(`qte-${item.id}`).textContent = item.qte;
                    document.getElementById(`badge-${item.id}`).textContent = item.qte > 1 ? `(x${item.qte})` : '';
                    sauvegarderDonnees();
                } else if (!item.permanent) {
                    // Si c'est un article manuel et qte tombe à 0, on le supprime
                    delete listeData[item.id];
                    sauvegarderDonnees();
                    divItem.remove();
                    nettoyerRayonsVides();
                }
            });

            const valQte = document.createElement('span');
            valQte.className = 'quantite-valeur';
            valQte.id = `qte-${item.id}`;
            valQte.textContent = item.qte;

            const btnPlus = document.createElement('button');
            btnPlus.className = 'quantite-btn';
            btnPlus.textContent = '+';
            btnPlus.addEventListener('click', () => {
                item.qte++;
                document.getElementById(`qte-${item.id}`).textContent = item.qte;
                document.getElementById(`badge-${item.id}`).textContent = `(x${item.qte})`;
                sauvegarderDonnees();
            });

            divQte.appendChild(btnMoins);
            divQte.appendChild(valQte);
            divQte.appendChild(btnPlus);
            divItem.appendChild(divQte);

            return divItem;
        }

        // Gérer le placement en haut (dans le bon rayon) ou en bas (coché)
        function deplacerVisuellement(item, elementHTML) {
            if (item.checked) {
                conteneurCoches.appendChild(elementHTML);
            } else {
                const idRayon = `rayon-${item.rayon.replace(/\s/g, '-')}`;
                let divRayon = document.getElementById(idRayon);
                
                if (!divRayon) {
                    divRayon = document.createElement('div');
                    divRayon.className = 'rayon';
                    divRayon.id = idRayon;
                    divRayon.innerHTML = `<div class="rayon-titre">${item.rayon}</div>`;
                    conteneurAPrendre.appendChild(divRayon);
                }
                divRayon.appendChild(elementHTML);
            }
            nettoyerRayonsVides();
        }

        function nettoyerRayonsVides() {
            document.querySelectorAll('.rayon').forEach(r => {
                // Si le rayon n'a plus d'enfants à part son titre, on le vire
                if (r.children.length <= 1) r.remove();
            });
        }

        // Ajouter un produit manuellement via la barre du haut
        function ajouterArticleManuel() {
            const input = document.getElementById('nouvel-article');
            const nom = input.value.trim();
            if (!nom) return;

            const idUnique = 'custom-' + Date.now();
            const nouvelItem = {
                id: idUnique,
                nom: nom,
                rayon: "✨ Divers / Imprévus",
                checked: false,
                qte: 1,
                permanent: false
            };

            listeData[idUnique] = nouvelItem;
            sauvegarderDonnees();

            const elementDOM = genererDOMArticle(nouvelItem);
            deplacerVisuellement(nouvelItem, elementDOM);

            input.value = ''; // Reset l'input
        }

        // Lancer l'ajout rapide aussi avec la touche "Entrée" du clavier
        document.getElementById('nouvel-article').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ajouterArticleManuel();
        });

        // TOUT DÉCOCHER (Pour les courses suivantes)
        function toutEffacer() {
            if (confirm("Réinitialiser la liste pour vos prochaines courses ?")) {
                Object.keys(listeData).forEach(id => {
                    if (listeData[id].permanent) {
                        listeData[id].checked = false;
                        listeData[id].qte = 1; // Reset les quantités aussi
                    } else {
                        // Supprime les articles ajoutés à la main pour ne pas encombrer
                        delete listeData[id];
                    }
                });
                sauvegarderDonnees();
                window.location.reload(); // Recharge proprement l'affichage
            }
        }

        // Rendu initial au chargement de la page
        Object.values(listeData).forEach(item => {
            const element = genererDOMArticle(item);
            deplacerVisuellement(item, element);
        });
    </script>
</body>
</html>
