<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Courses</title>
    <style>
        body { background-color: #121212 !important; color: #ffffff !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; margin: 0; }
        .rayon { background: #1e1e1e; border-left: 4px solid #3498db; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .done-rayon { background: #1e1e1e; border-left: 4px solid #555; padding: 12px; border-radius: 8px; margin-bottom: 15px; opacity: 0.7; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .btn-add { background: #2ecc71; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-weight: bold; cursor: pointer; }
        .btn-qty { background: #444; color: white; border: none; border-radius: 5px; padding: 2px 8px; margin: 0 5px; cursor: pointer; }
        .btn-reset { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="resetList()">🔄 Réinitialiser la liste</button>

    <script>
        const cats = ["🍉 Fruits & Légumes", "🥩 Frais & Viande", "❄️ Surgelés", "🥐 Épicerie", "🍾 Boissons", "🧼 Hygiène"];
        const itemsInit = [
            {n: "Raisin", c: "🍉 Fruits & Légumes"}, {n: "Tomate", c: "🍉 Fruits & Légumes"}, {n: "Carottes", c: "🍉 Fruits & Légumes"}, {n: "Carottes râpées", c: "🍉 Fruits & Légumes"},
            {n: "Jambon", c: "🥩 Frais & Viande"}, {n: "Lait bleu", c: "🥩 Frais & Viande"}, {n: "Lait vert", c: "🥩 Frais & Viande"}, {n: "Oeufs", c: "🥩 Frais & Viande"}, {n: "Yaourt", c: "🥩 Frais & Viande"}, {n: "Chorizo", c: "🥩 Frais & Viande"},
            {n: "Glace", c: "❄️ Surgelés"}, {n: "Olives vertes", c: "🥐 Épicerie"}, {n: "Olives noires", c: "🥐 Épicerie"}, {n: "Dentifrice", c: "🧼 Hygiène"}, {n: "Limonade", c: "🍾 Boissons"}
        ];

        let data = JSON.parse(localStorage.getItem('myList')) || itemsInit.map((item, i) => ({id: i, nom: item.n, cat: item.c, done: false, qty: 1}));

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";
            cats.forEach(c => {
                const items = data.filter(i => i.cat === c && !i.done);
                if (items.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'rayon';
                    div.innerHTML = `<div style="display:flex; justify-content:space-between;"><h3>${c}</h3><button class="btn-add" onclick="add('${c}')">+</button></div>`;
                    items.forEach(i => {
                        div.innerHTML += `<div class="item">
                            <span><input type="checkbox" onchange="toggle(${i.id})"> ${i.nom} ${i.qty > 1 ? 'x'+i.qty : ''}</span>
                            <span><button class="btn-qty" onclick="changeQty(${i.id}, -1)">-</button><button class="btn-qty" onclick="changeQty(${i.id}, 1)">+</button></span>
                        </div>`;
                    });
                    app.appendChild(div);
                }
            });
            const done = data.filter(i => i.done);
            if (done.length > 0) {
                const div = document.createElement('div');
                div.innerHTML = "<h3>✅ Déjà pris</h3>";
                cats.forEach(c => {
                    const items = done.filter(i => i.cat === c);
                    if (items.length > 0) {
                        div.innerHTML += `<div class="done-rayon"><h4>${c}</h4>` + 
                        items.map(i => `<div class="item" style="text-decoration:line-through;"><label><input type="checkbox" checked onchange="toggle(${i.id})"> ${i.nom}</label></div>`).join('') +
                        `</div>`;
                    }
                });
                app.appendChild(div);
            }
        }

        function toggle(id) { data.find(i => i.id === id).done = !data.find(i => i.id === id).done; save(); }
        function changeQty(id, delta) { const item = data.find(i => i.id === id); item.qty = Math.max(1, (item.qty || 1) + delta); save(); }
        function add(cat) { const n = prompt("Article :"); if(n) { data.push({id: Date.now(), nom: n, cat: cat, done: false, qty: 1}); save(); } }
        function resetList() { if(confirm("Vider toute la liste ?")) { localStorage.clear(); location.reload(); } }
        function save() { localStorage.setItem('myList', JSON.stringify(data)); render(); }
        render();
    </script>
</body>
</html>
