<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste</title>
    <style>
        /* On force un design sombre propre et lisible pour tout le monde */
        body { 
            background-color: #1e1e1e !important; 
            color: #ffffff !important; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; 
            margin: 0;
        }
        .rayon { 
            background: #2d2d2d; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #444;
        }
        h1 { color: #ffffff !important; text-align: center; }
        h3 { color: #3498db !important; margin-top: 0; }
        .produit { 
            display: flex; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #444;
            font-size: 16px;
        }
        input[type="checkbox"] { 
            width: 20px; 
            height: 20px; 
            margin-right: 15px; 
        }
        .btn-reset { 
            width: 100%; 
            padding: 15px; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="localStorage.clear(); location.reload();">🔄 Réinitialiser la liste</button>

    <script>
        // Ta liste de base
        const categories = {
            "Fruits & Légumes": ["Raisin", "Tomate", "Carottes", "Carottes râpées"],
            "Frais & Viande": ["Jambon", "Lait bleu", "Lait vert", "Oeufs", "Yaourt", "Chorizo"],
            "Épicerie": ["Olives vertes", "Olives noires"],
            "Surgelés": ["Glace"]
        };

        let data = JSON.parse(localStorage.getItem('liste')) || {};

        // Initialisation si vide
        if (Object.keys(data).length === 0) {
            Object.keys(categories).forEach(cat => {
                categories[cat].forEach(nom => {
                    const id = nom.toLowerCase().replace(/\s/g, '');
                    data[id] = { id, nom, cat, done: false };
                });
            });
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";
            
            Object.keys(categories).forEach(cat => {
                const items = Object.values(data).filter(i => i.cat === cat && !i.done);
                if (items.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'rayon';
                    div.innerHTML = `<h3>${cat}</h3>`;
                    items.forEach(i => {
                        div.innerHTML += `<div class="produit"><input type="checkbox" onchange="toggle('${i.id}')"> ${i.nom}</div>`;
                    });
                    app.appendChild(div);
                }
            });

            // Section "Déjà pris"
            const doneItems = Object.values(data).filter(i => i.done);
            if (doneItems.length > 0) {
                const div = document.createElement('div');
                div.className = 'rayon';
                div.innerHTML = `<h3>✅ Déjà pris</h3>`;
                doneItems.forEach(i => {
                    div.innerHTML += `<div class="produit" style="color: #888;"><input type="checkbox" checked onchange="toggle('${i.id}')"> ${i.nom}</div>`;
                });
                app.appendChild(div);
            }
        }

        function toggle(id) { data[id].done = !data[id].done; localStorage.setItem('liste', JSON.stringify(data)); render(); }
        render();
    </script>
</body>
</html>
