<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Liste</title>
    <style>
        /* Couleurs forcées pour éviter les bugs d'affichage sombre/clair */
        body { background-color: #1e1e1e !important; color: #ffffff !important; font-family: sans-serif; padding: 15px; margin: 0; padding-bottom: 80px; }
        .rayon { background: #2d2d2d !important; border-left: 5px solid #3498db; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .rayon-done { background: #252525 !important; border-left: 5px solid #7f8c8d; border-radius: 8px; padding: 12px; margin-bottom: 10px; opacity: 0.9; }
        .header-rayon { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .rayon-titre { font-weight: bold; color: #ffffff !important; font-size: 1.1em; }
        .btn-plus { background: #2ecc71; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; }
        .produit { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid #444; }
        .checked-text { text-decoration: line-through; color: #7f8c8d; }
        .btn-reset { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; }
        .quantite-control { display: flex; align-items: center; gap: 8px; }
        .quantite-btn { background: #444; color: white; border: none; width: 25px; height: 25px; border-radius: 50%; }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="localStorage.clear(); location.reload();">🔄 Tout Supprimer</button>

    <script>
        const categories = ["🍉 Fruits & Légumes", "🥩 Frais & Viande", "❄️ Surgelés", "🥐 Épicerie", "🍾 Boissons", "🧼 Hygiène"];
        let data = JSON.parse(localStorage.getItem('liste')) || {};

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";

            // À PRENDRE
            categories.forEach(cat => {
                const items = Object.values(data).filter(i => i.cat === cat && !i.done);
                if (items.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'rayon';
                    div.innerHTML = `<div class="header-rayon"><div class="rayon-titre">${cat}</div><button class="btn-plus" onclick="add('${cat}')">+</button></div>`;
                    items.forEach(i => {
                        div.innerHTML += `<div class="produit">
                            <label><input type="checkbox" onchange="toggle('${i.id}')"> ${i.nom} ${i.qte > 1 ? '(x' + i.qte + ')' : ''}</label>
                            <div class="quantite-control"><button class="quantite-btn" onclick="qte('${i.id}', -1)">-</button>${i.qte}<button class="quantite-btn" onclick="qte('${i.id}', 1)">+</button></div>
                        </div>`;
                    });
                    app.appendChild(div);
                }
            });

            // DÉJÀ PRIS
            const doneDiv = document.createElement('div');
            doneDiv.innerHTML = "<h3 style='color:#7f8c8d; margin-top:30px;'>✅ Déjà pris</h3>";
            categories.forEach(cat => {
                const items = Object.values(data).filter(i => i.cat === cat && i.done);
                if (items.length > 0) {
                    doneDiv.innerHTML += `<div class="rayon-done"><div class="rayon-titre" style="color:#7f8c8d">${cat}</div>`;
                    items.forEach(i => {
                        doneDiv.innerHTML += `<div class="produit"><label><input type="checkbox" checked onchange="toggle('${i.id}')"> <span class="checked-text">${i.nom}</span></label></div>`;
                    });
                    doneDiv.innerHTML += `</div>`;
                }
            });
            app.appendChild(doneDiv);
        }

        function toggle(id) { data[id].done = !data[id].done; save(); }
        function qte(id, delta) { data[id].qte = Math.max(1, (data[id].qte || 1) + delta); save(); }
        function add(cat) { const n = prompt("Article :"); if(n) { const id = Date.now(); data[id] = {id, nom:n, cat, done:false, qte:1}; save(); } }
        function save() { localStorage.setItem('liste', JSON.stringify(data)); render(); }
        render();
    </script>
</body>
</html>
