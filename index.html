<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Liste</title>
    <style>
        body { background-color: #1e1e1e !important; color: #ffffff !important; font-family: sans-serif; padding: 15px; margin: 0; padding-bottom: 80px; }
        .rayon { background: #2d2d2d !important; border-left: 5px solid #3498db; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .rayon-done { background: #252525 !important; border-left: 5px solid #7f8c8d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .titre { font-weight: bold; color: #ffffff !important; font-size: 1.1em; }
        .btn-plus { background: #2ecc71; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; }
        .produit { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid #444; }
        .btn-reset { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="localStorage.clear(); location.reload();">🔄 Tout Supprimer (Réinitialiser)</button>

    <script>
        const cats = ["🍉 Fruits & Légumes", "🥩 Frais & Viande", "❄️ Surgelés", "🥐 Épicerie", "🍾 Boissons", "🧼 Hygiène"];
        let data = JSON.parse(localStorage.getItem('ma_liste')) || [];

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";

            cats.forEach(c => {
                // Articles à acheter
                const toBuy = data.filter(i => i.cat === c && !i.done);
                if (toBuy.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'rayon';
                    div.innerHTML = `<div class="header"><div class="titre">${c}</div><button class="btn-plus" onclick="add('${c}')">+</button></div>`;
                    toBuy.forEach(i => {
                        div.innerHTML += `<div class="produit">
                            <label><input type="checkbox" onchange="toggle(${i.id})"> ${i.nom}</label>
                        </div>`;
                    });
                    app.appendChild(div);
                }
            });

            // Articles déjà pris
            const done = data.filter(i => i.done);
            if (done.length > 0) {
                const div = document.createElement('div');
                div.innerHTML = "<h3 style='color:#7f8c8d; margin-top:30px;'>✅ Déjà pris</h3>";
                cats.forEach(c => {
                    const items = done.filter(i => i.cat === c);
                    if (items.length > 0) {
                        div.innerHTML += `<div class="rayon-done"><div class="titre">${c}</div>` + 
                        items.map(i => `<div class="produit"><label><input type="checkbox" checked onchange="toggle(${i.id})"> <span style='text-decoration:line-through;color:#7f8c8d'>${i.nom}</span></label></div>`).join('') +
                        `</div>`;
                    }
                });
                app.appendChild(div);
            }
        }

        function toggle(id) { 
            const item = data.find(i => i.id === id);
            item.done = !item.done; 
            save(); 
        }
        function add(cat) { 
            const n = prompt("Article :"); 
            if(n) { 
                data.push({id: Date.now(), nom: n, cat: cat, done: false}); 
                save(); 
            } 
        }
        function save() { localStorage.setItem('ma_liste', JSON.stringify(data)); render(); }
        render();
    </script>
</body>
</html>
