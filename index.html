<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Courses</title>
    <style>
        body { background-color: #121212 !important; color: #ffffff !important; font-family: sans-serif; padding: 15px; margin: 0; }
        .rayon { background: #1e1e1e; border-left: 4px solid #3498db; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .done-rayon { background: #1e1e1e; border-left: 4px solid #555; padding: 15px; border-radius: 8px; margin-bottom: 15px; opacity: 0.7; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .btn-add { background: #2ecc71; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; }
        .btn-qty { background: #444; color: white; border: none; border-radius: 5px; padding: 2px 8px; margin: 0 5px; }
        .btn-reset { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="localStorage.clear(); location.reload();">🔄 Tout Supprimer</button>

    <script>
        const cats = ["🍉 Fruits & Légumes", "🥩 Frais & Viande", "❄️ Surgelés", "🥐 Épicerie", "🍾 Boissons", "🧼 Hygiène"];
        let data = JSON.parse(localStorage.getItem('myList')) || [];

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";

            // À acheter
            cats.forEach(c => {
                const items = data.filter(i => i.cat === c && !i.done);
                if (items.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'rayon';
                    div.innerHTML = `<div style="display:flex; justify-content:space-between;"><h3>${c}</h3><button class="btn-add" onclick="add('${c}')">+</button></div>`;
                    items.forEach(i => {
                        div.innerHTML += `<div class="item">
                            <span><input type="checkbox" onchange="toggle(${i.id})"> ${i.nom} ${i.qty > 1 ? 'x'+i.qty : ''}</span>
                            <span><button class="btn-qty" onclick="changeQty(${i.id}, -1)">-</button><button class="btn-qty" onclick="changeQty(${i.id}, 1)">+</button></span>
                        </div>`;
                    });
                    app.appendChild(div);
                }
            });

            // Déjà pris
            const doneItems = data.filter(i => i.done);
            if (doneItems.length > 0) {
                const div = document.createElement('div');
                div.innerHTML = "<h3>✅ Déjà pris</h3>";
                cats.forEach(c => {
                    const items = doneItems.filter(i => i.cat === c);
                    if (items.length > 0) {
                        div.innerHTML += `<div class="done-rayon"><h4>${c}</h4>` + 
                        items.map(i => `<div class="item" style="text-decoration:line-through;"><label><input type="checkbox" checked onchange="toggle(${i.id})"> ${i.nom}</label></div>`).join('') +
                        `</div>`;
                    }
                });
                app.appendChild(div);
            }
        }

        function toggle(id) { data.find(i => i.id === id).done = !data.find(i => i.id === id).done; save(); }
        function changeQty(id, delta) { 
            const item = data.find(i => i.id === id); 
            item.qty = Math.max(1, (item.qty || 1) + delta); 
            save(); 
        }
        function add(cat) { 
            const n = prompt("Article :"); 
            if(n) { data.push({id: Date.now(), nom: n, cat: cat, done: false, qty: 1}); save(); } 
        }
        function save() { localStorage.setItem('myList', JSON.stringify(data)); render(); }
        render();
    </script>
</body>
</html>
