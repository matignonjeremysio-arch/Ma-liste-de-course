<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste</title>
    <style>
        /* On force le blanc et le noir pour que ça reste lisible partout */
        body { 
            background-color: white !important; 
            color: black !important; 
            font-family: sans-serif; 
            padding: 20px; 
        }
        .rayon { 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc;
        }
        h3 { color: black; }
        .btn-reset { 
            width: 100%; 
            padding: 15px; 
            background: red; 
            color: white; 
            border: none; 
            border-radius: 10px; 
        }
    </style>
</head>
<body>

    <h1 style="color: black;">🛒 Ma Liste</h1>
    <div id="app"></div>
    <button class="btn-reset" onclick="localStorage.clear(); location.reload();">REINITIALISER</button>

    <script>
        const categories = ["Fruits & Légumes", "Frais & Viande", "Surgelés", "Épicerie", "Boissons", "Hygiène"];
        let data = JSON.parse(localStorage.getItem('liste')) || {};

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = "";
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'rayon';
                div.innerHTML = `<h3>${cat}</h3>`;
                app.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
