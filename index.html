<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Super Liste de Courses Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Variables de couleurs : Mode Clair par défaut */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --checked-color: #95a5a6;
            --coché-bg: #eaeded;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
        }
        
        /* Mode Sombre Automatique (détecte les réglages de l'iPhone) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-color: #e0e0e0;
                --accent-color: #2980b9;
                --checked-color: #555555;
                --coché-bg: #2c2c2c;
                --border-color: #333333;
                --input-bg: #2a2a2a;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* BARRE D'AJOUT RAPIDE */
        .ajout-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .ajout-container input {
            flex: 1;
            border: 2px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .ajout-container button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* STRUCTURE DES RAYONS */
        #liste-a-prendre {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .rayon {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .rayon:empty {
            display: none;
        }

        .rayon-titre {
            font-size: 16px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        /* LIGNE PRODUIT */
        .produit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            -webkit-tap-highlight-color: transparent;
        }

        .produit-item:last-child {
            border-bottom: none;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--checked-color);
            border-radius: 6px;
            margin-right: 12px;
            outline: none;
            position: relative;
            background-color: var(--input-bg);
        }

        input[type="checkbox"]:checked {
            background-color: #2ecc71;
            border-color: #2ecc71;
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .produit-texte {
            font-size: 16px;
        }

        input[type="checkbox"]:checked + .produit-texte {
            color: var(--checked-color);
            text-decoration: line-through;
        }

        /* COMPTEUR DE QUANTITÉ */
        .quantite-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .quantite-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .quantite-valeur {
            font-size: 14px;
            font-weight: bold;
            min-width: 14px;
            text-align: center;
        }

        /* ZONE COCHÉE */
        #liste-coches {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed var(--checked-color);
        }

        #liste-coches .rayon-titre {
            color: var(--checked-color);
            text-align: center;
            border-bottom: none;
        }

        #liste-coches .produit-item {
            background-color: var(--coché-bg);
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            border-bottom: none;
        }

        #liste-coches .quantite-control {
            display: none;
        }

        /* BOUTON RESET FOOTER */
        .btn-reset {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
